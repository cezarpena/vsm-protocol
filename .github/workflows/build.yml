name: Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v0.1.0

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build macOS binaries
        run: |
          chmod +x build.sh
          ./build.sh all
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsmprotocol-macos
          path: dist/darwin-*/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev
        
      - name: Build Linux binaries
        run: |
          chmod +x build.sh
          ./build.sh ci-linux
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsmprotocol-linux
          path: dist/linux-*/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Download Npcap SDK
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "npcap-sdk"

      - name: Build Windows binaries
        shell: bash
        run: |
          # Npcap SDK has a slightly different folder structure
          export CGO_CFLAGS="-I$(pwd)/npcap-sdk/Include"
          export CGO_LDFLAGS="-L$(pwd)/npcap-sdk/Lib/x64"
          chmod +x build.sh
          ./build.sh ci-windows
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsmprotocol-windows
          path: dist/windows-*/*

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare Release Assets
        run: |
          mkdir -p dist-assets
          # Walk through artifacts and rename them to include platform/arch
          # Pattern: release-assets/vsmprotocol-macos/darwin-arm64/vsmprotocol.dylib
          # Target: dist-assets/vsmprotocol-darwin-arm64.dylib
          
          # Linux
          cp release-assets/vsmprotocol-linux/linux-amd64/vsmprotocol.so dist-assets/vsmprotocol-linux-amd64.so || true
          
          # MacOS
          cp release-assets/vsmprotocol-macos/darwin-arm64/vsmprotocol.dylib dist-assets/vsmprotocol-darwin-arm64.dylib || true
          cp release-assets/vsmprotocol-macos/darwin-amd64/vsmprotocol.dylib dist-assets/vsmprotocol-darwin-amd64.dylib || true
          
          # Windows
          cp release-assets/vsmprotocol-windows/windows-amd64/vsmprotocol.dll dist-assets/vsmprotocol-windows-amd64.dll || true
          
          # Header
          cp dist/vsmprotocol.h dist-assets/vsmprotocol.h || echo "Header not found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
